server:
  port: "8080"
  mode: "debug"
  read_timeout: "60s"
  write_timeout: "60s"

database:
  host: "localhost"
  port: 5432
  name: "go_ddd_scaffold"
  user: "shenfay"
  password: "postgres"
  ssl_mode: "disable"
  max_idle_conns: 5
  max_open_conns: 20
  conn_max_lifetime: "1h"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

jwt:
  secret: "${SECRET_JWT_KEY:-your-jwt-secret-key-change-in-production}"
  access_expire: 15m
  refresh_expire: 168h

logging:
  level: "debug"
  format: "console"
  file: "./logs/app.log"
  max_size: 100        # 单个日志文件最大 100MB
  max_backups: 3       # 保留 3 个旧日志文件
  max_age: 28          # 日志文件保留 28 天

snowflake:
  node_id: 1

events:
  # Asynq 配置
  asynq:
    concurrency: 10
    queues:
      high_priority: 5
      default: 3
      low_priority: 1
    retry:
      max_attempts: 3
      min_backoff: 1s
      max_backoff: 60s
  
  # 事件去重配置
  deduplication:
    ttl: 24h
    
  # 监控配置
  monitoring:
    enable_metrics: true
    scrape_interval: 30s
    enable_alerts: true
    
  # 告警配置
  alerts:
    channels:
      - type: console
        enabled: true
      - type: webhook
        enabled: false
        url: ""
    rules:
      - name: high_failure_rate
        threshold: 0.1
        severity: warning
      - name: queue_backlog
        threshold: 1000
        severity: warning
      - name: processing_slow
        threshold: 5.0
        severity: critical

security:
  password_policy:
    min_length: 8
    max_length: 128
    require_uppercase: true
    require_lowercase: true
    require_digits: true
    require_special_chars: false
    special_chars: "!@#$%^&*()_+-=[]{}|;:,.<>?"
    disallow_common: true
  password_hasher:
    cost: 12

# 邮件配置（QQ 邮箱示例）
email:
  smtp_host: "smtp.qq.com"
  smtp_port: 587
  username: "shengfai@qq.com"
  password: "bmjgkhfimmntbhfd"  # 邮箱授权码
  from: "shengfai@qq.com"
  from_name: "DDD Scaffold"
  enable_tls: true