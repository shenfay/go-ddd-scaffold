server:
  port: 8080
  mode: debug  # debug, release, test
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

database:
  host: localhost
  port: 5432
  name: go_ddd_scaffold_dev
  user: postgres
  password: ${DB_PASSWORD}  # 从环境变量读取
  ssl_mode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: ${JWT_SECRET}  # 从环境变量读取，生产环境必须修改
  access_expire: 30m
  refresh_expire: 168h  # 7 天
  issuer: go-ddd-scaffold

asynq:
  addr: localhost:6379
  concurrency: 10
  queues:
    critical: 6
    default: 3
    low: 1

logger:
  level: debug
  format: console  # json, console
  output_path: stdout
