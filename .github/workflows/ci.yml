name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# 防止重复触发
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.21'
  GO_CACHE: ~/go/pkg/mod
  BUILD_CACHE: ~/.cache/go-build

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        cache-dependency-path: backend/go.sum
    
    - name: Install dependencies
      working-directory: ./backend
      run: make install deps
    
    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    
    - name: Run linter
      working-directory: ./backend
      run: make lint
    
    - name: Run go vet
      working-directory: ./backend
      run: make vet
    
    - name: Check formatting
      working-directory: ./backend
      run: |
        make fmt
        if [ -n "$(git diff)" ]; then
          echo "Code is not formatted. Run 'make fmt' locally and commit."
          exit 1
        fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    strategy:
      matrix:
        test-type: [unit, integration]
      fail-fast: false
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: go_ddd_scaffold_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        cache-dependency-path: backend/go.sum
    
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.GO_CACHE }}
          ${{ env.BUILD_CACHE }}
        key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Install dependencies
      working-directory: ./backend
      run: make install deps
    
    - name: Run ${{ matrix.test-type }} tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/go_ddd_scaffold_test?sslmode=disable
        REDIS_URL: redis://localhost:6379
      run: |
        if [ "${{ matrix.test-type }}" = "unit" ]; then
          make test unit
        else
          make test integration
        fi
    
    - name: Generate coverage report
      if: matrix.test-type == 'unit'
      working-directory: ./backend
      run: |
        go test -coverprofile=coverage.out ./internal/...
        go tool cover -func=coverage.out | grep "total:" | awk '{print $3}' | sed 's/%//' > coverage-percent.txt
        COVERAGE=$(cat coverage-percent.txt)
        echo "Test coverage: ${COVERAGE}%"
        if (( $(echo "$COVERAGE < 60" | bc -l) )); then
          echo "Coverage ${COVERAGE}% is below threshold 60%"
          exit 1
        fi
    
    - name: Upload coverage reports to Codecov
      if: matrix.test-type == 'unit'
      uses: codecov/codecov-action@v4
      with:
        files: ./backend/coverage.out
        flags: unittests
        fail_ci_if_error: false
        verbose: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    strategy:
      matrix:
        target: [api, worker, cli]
      fail-fast: false
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        cache-dependency-path: backend/go.sum
    
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.GO_CACHE }}
          ${{ env.BUILD_CACHE }}
        key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Build ${{ matrix.target }}
      working-directory: ./backend
      run: |
        case ${{ matrix.target }} in
          api) make build ;;
          worker) make build worker ;;
          cli) make cli ;;
        esac
