definitions:
  go-ddd-scaffold_internal_application_user_dto.CreateTenantRequest:
    properties:
      description:
        type: string
      maxMembers:
        minimum: 1
        type: integer
      name:
        type: string
    required:
    - maxMembers
    - name
    type: object
  go-ddd-scaffold_internal_application_user_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  go-ddd-scaffold_internal_application_user_dto.LoginResponse:
    properties:
      accessToken:
        type: string
      user:
        $ref: '#/definitions/go-ddd-scaffold_internal_application_user_dto.User'
    type: object
  go-ddd-scaffold_internal_application_user_dto.RegisterRequest:
    properties:
      email:
        type: string
      nickname:
        type: string
      password:
        minLength: 6
        type: string
      role:
        description: 可选，默认为 member
        enum:
        - member
        - guest
        type: string
      tenantId:
        type: string
    required:
    - email
    - nickname
    - password
    type: object
  go-ddd-scaffold_internal_application_user_dto.UpdateProfileRequest:
    properties:
      bio:
        type: string
      nickname:
        type: string
      phone:
        type: string
    type: object
  go-ddd-scaffold_internal_application_user_dto.UpdateUserRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      status:
        enum:
        - ACTIVE
        - INACTIVE
        - SUSPENDED
        type: string
    type: object
  go-ddd-scaffold_internal_application_user_dto.User:
    properties:
      avatar:
        type: string
      bio:
        type: string
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      nickname:
        type: string
      phone:
        type: string
      role:
        type: string
      status:
        type: string
      tenantId:
        type: string
      updatedAt:
        type: string
    type: object
  go-ddd-scaffold_internal_pkg_response.ErrorInfo:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  go-ddd-scaffold_internal_pkg_response.Response:
    properties:
      code:
        type: string
      data: {}
      error:
        $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.ErrorInfo'
      message:
        type: string
      requestId:
        type: string
      timestamp:
        type: string
    type: object
  internal_interfaces_http_tenant.CreateTenantRequest:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        type: string
    required:
    - name
    type: object
info:
  contact: {}
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: 用户登录接口
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-ddd-scaffold_internal_application_user_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_application_user_dto.LoginResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "403":
          description: 账户被禁用
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
      summary: 用户登录
      tags:
      - auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: 用户登出接口（将 token 加入黑名单）
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: 用户注册接口
      parameters:
      - description: 注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-ddd-scaffold_internal_application_user_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功的用户信息
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_application_user_dto.User'
        "400":
          description: 请求参数错误
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: 用户已存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 用户注册
      tags:
      - auth
  /api/tenants:
    post:
      consumes:
      - application/json
      description: 创建新的租户（家庭/组织）
      parameters:
      - description: 租户信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-ddd-scaffold_internal_application_user_dto.CreateTenantRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功的租户信息
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
      summary: 创建租户
      tags:
      - tenants
  /api/tenants/my-tenants:
    get:
      consumes:
      - application/json
      description: 获取当前登录用户所属的所有租户及其角色
      produces:
      - application/json
      responses:
        "200":
          description: 租户列表
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
      summary: 获取用户的租户列表
      tags:
      - tenants
  /api/users/{id}:
    get:
      consumes:
      - application/json
      description: 根据用户 ID 获取用户详细信息
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 用户信息
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_application_user_dto.User'
        "400":
          description: 无效的用户 ID
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
      summary: 获取用户信息
      tags:
      - users
    put:
      consumes:
      - application/json
      description: 更新指定用户的部分信息
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-ddd-scaffold_internal_application_user_dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
      summary: 更新用户信息
      tags:
      - users
  /api/users/info:
    get:
      consumes:
      - application/json
      description: 获取登录用户的详细信息
      produces:
      - application/json
      responses:
        "200":
          description: 用户信息
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_application_user_dto.User'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
      summary: 获取当前用户信息
      tags:
      - users
  /api/users/profile:
    put:
      consumes:
      - application/json
      description: 更新登录用户的个人资料（昵称、手机、简介）
      parameters:
      - description: 个人资料信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-ddd-scaffold_internal_application_user_dto.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
      summary: 更新个人资料
      tags:
      - users
swagger: "2.0"
