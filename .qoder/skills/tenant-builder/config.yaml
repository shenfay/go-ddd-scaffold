# Tenant Builder 配置文件
# 多租户 SaaS 架构生成工具

# 协同工作流配置
coordination:
  role: "tenant_architecture"
  input_format: "domain_model_json"
  output_format: "tenant_migration_sql"
  dependencies: 
    - "ddd-modeling-assistant"
  dependents: 
    - "api-endpoint-generator"
    - "db-migrator"

# 数据库连接配置（默认开发环境）
database:
  host: localhost
  port: 5432
  user: mathfun
  password: math111
  name: mathfun_dev
  ssl_mode: disable
  
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: "1h"

# 多环境配置
environments:
  dev:
    host: localhost
    port: 5432
    user: mathfun
    password: math111
    name: mathfun_dev
    ssl_mode: disable
    
  staging:
    host: staging-db.mathfun.local
    port: 5432
    user: mathfun_staging
    password: ${STAGING_DB_PASSWORD}
    name: mathfun_staging
    ssl_mode: disable
    
  prod:
    host: prod-db.mathfun.local
    port: 5432
    user: mathfun_prod
    password: ${PROD_DB_PASSWORD}
    name: mathfun_prod
    ssl_mode: require

# 租户管理配置
tenant_management:
  # 租户识别方式
  identification:
    type: "subdomain"  # subdomain / header / jwt
    header_name: "X-Tenant-ID"
    
  # 套餐计划
  plans:
    free:
      max_users: 3
      max_storage: 104857600  # 100MB
      features:
        - "basic_games"
        - "limited_progress_tracking"
    
    basic:
      max_users: 10
      max_storage: 1073741824  # 1GB
      features:
        - "basic_games"
        - "full_progress_tracking"
        - "family_reports"
    
    premium:
      max_users: 50
      max_storage: 5368709120  # 5GB
      features:
        - "all_games"
        - "advanced_analytics"
        - "priority_support"
        - "api_access"
  
  # 租户状态
  statuses:
    - active
    - suspended
    - expired
    - cancelled

# 家庭角色系统配置
family_system:
  # 预定义角色
  roles:
    - parent     # 家长（管理员）
    - child      # 孩子
    - educator   # 教育工作者
  
  # 角色权限
  role_permissions:
    parent:
      - "children:read"
      - "children:manage"
      - "learning_progress:read"
      - "subscriptions:view"
      - "families:join"
    
    child:
      - "learning_resources:read"
      - "games:play"
      - "learning_progress:update"
    
    educator:
      - "students:read"
      - "students:assign_tasks"
      - "learning_progress:read"
      - "learning_progress:analyze"
  
  # 邀请机制
  invitation:
    enabled: true
    code_length: 8
    expire_hours: 72
    max_pending: 10

# Casbin RBAC 配置
casbin:
  enabled: true
  model_file: "backend/config/auth/rbac_model.conf"
  policy_file: "backend/config/auth/rbac_with_domains.conf"
  adapter: "gorm"  # gorm / file
  
  # 默认策略
  default_policies:
    - "p, admin, tenants, *, allow"
    - "p, parent, children, read, allow"
    - "p, child, learning_resources, read, allow"

# 数据隔离配置
data_isolation:
  # 隔离级别
  isolation_level: "row"  # row / schema / database
  
  # 中间件配置
  middleware:
    enabled: true
    skip_paths:
      - "/health"
      - "/api/v1/auth/*"
      - "/api/v1/public/*"
  
  # GORM 插件
  gorm_plugin:
    enabled: true
    auto_append_tenant_id: true

# 订阅管理配置
subscription:
  # 账单周期
  billing_cycles:
    - monthly
    - yearly
  
  # 支付方式
  payment_methods:
    - wechat_pay
    - alipay
    - bank_transfer
  
  # 自动续费
  auto_renewal:
    enabled: true
    reminder_days: 7  # 到期前提醒天数

# 代码生成配置
generation:
  paths:
    migrations: backend/migrations/sql
    dao_output: backend/internal/infrastructure/persistence/gorm
    model_output: backend/internal/infrastructure/persistence/gorm/model
    middleware: backend/internal/infrastructure/middleware
    casbin_config: backend/config/auth
  
  standards:
    naming:
      table_format: snake_case
      field_format: snake_case
    timestamps:
      created: created_at
      updated: updated_at
      deleted: deleted_at
    comments:
      required: true
      format: "COMMENT ON COLUMN {{table}}.{{column}} IS '{{comment}}'"

# 验证配置
validation:
  pre_execution: true
  syntax_check: true
  dependency_check: true
  post_generation: true
  compilation_check: true

# 日志配置
logging:
  level: info
  format: json
  output: stdout

# 功能开关
features:
  auto_backup: true
  dry_run_support: true
  interactive_mode: true
  conflict_detection: true

# 版本信息
version: "1.0.0"
created: "2026-02-25"
