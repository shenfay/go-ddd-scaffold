# API端点生成器配置文件
# 遵循 MathFun 项目规范和RESTful最佳实践

# 协同工作流配置
coordination:
  # 在协同工作流中的角色
  role: "api_layer"
  # 输入数据格式
  input_formats: 
    - "domain_model_json"
    - "migration_sql"
    - "error_framework"
  # 输出数据格式
  output_format: "api_endpoints"
  # 依赖的Skills（上游）
  dependencies: 
    - "ddd-modeling-assistant"
    - "database-migrator"
    - "error-handler-builder"
  # 被依赖的Skills（下游）
  dependents: 
    - "error-handler-builder"
    - "api-doc-generator"

api_generation:
  # RESTful API配置
  rest:
    base_path: "/api/v1"
    version: "v1"
    id_parameter: ":id"
    
    # HTTP方法映射
    methods:
      create: "POST"
      read: "GET"
      update: "PUT"
      delete: "DELETE"
      list: "GET"
      batch_create: "POST"
      batch_update: "PUT"
      batch_delete: "DELETE"
    
    # 响应状态码配置
    responses:
      success_status: 200
      created_status: 201
      accepted_status: 202
      no_content_status: 204
      bad_request_status: 400
      unauthorized_status: 401
      forbidden_status: 403
      not_found_status: 404
      conflict_status: 409
      unprocessable_entity_status: 422
      internal_error_status: 500
      service_unavailable_status: 503
  
  # 分页配置
  pagination:
    enabled: true
    default_limit: 20
    max_limit: 100
    page_parameter: "page"
    limit_parameter: "limit"
    offset_parameter: "offset"
  
  # 排序配置
  sorting:
    enabled: true
    default_field: "created_at"
    default_direction: "desc"
    field_parameter: "sort"
    direction_parameter: "order"
    allowed_directions: ["asc", "desc"]
  
  # 筛选配置
  filtering:
    enabled: true
    max_filters: 10
    allowed_operators: ["eq", "ne", "gt", "lt", "gte", "lte", "in", "like"]
    case_sensitive: false

# 验证配置
validation:
  enabled: true
  default_rules: ["required"]
  
  # 验证规则定义
  rules:
    - name: "required"
      description: "字段必填"
      template: "if {{.FieldName}} == \"\" { return errors.New(\"{{.FieldName}} is required\") }"
      applicable_types: ["string", "number", "boolean"]
    
    - name: "min_length"
      description: "最小长度验证"
      template: "if len({{.FieldName}}) < {{.MinLength}} { return errors.New(\"{{.FieldName}} too short, minimum {{.MinLength}} characters\") }"
      applicable_types: ["string"]
    
    - name: "max_length"
      description: "最大长度验证"
      template: "if len({{.FieldName}}) > {{.MaxLength}} { return errors.New(\"{{.FieldName}} too long, maximum {{.MaxLength}} characters\") }"
      applicable_types: ["string"]
    
    - name: "min_value"
      description: "最小值验证"
      template: "if {{.FieldName}} < {{.MinValue}} { return errors.New(\"{{.FieldName}} too small, minimum {{.MinValue}}\") }"
      applicable_types: ["number", "integer"]
    
    - name: "max_value"
      description: "最大值验证"
      template: "if {{.FieldName}} > {{.MaxValue}} { return errors.New(\"{{.FieldName}} too large, maximum {{.MaxValue}}\") }"
      applicable_types: ["number", "integer"]
    
    - name: "email"
      description: "邮箱格式验证"
      template: "if !emailRegex.MatchString({{.FieldName}}) { return errors.New(\"invalid email format\") }"
      applicable_types: ["string"]
    
    - name: "phone"
      description: "手机号格式验证"
      template: "if !phoneRegex.MatchString({{.FieldName}}) { return errors.New(\"invalid phone number format\") }"
      applicable_types: ["string"]
    
    - name: "enum"
      description: "枚举值验证"
      template: "validValues := []string{ {{.EnumValues}} }; if !contains(validValues, {{.FieldName}}) { return errors.New(\"invalid enum value\") }"
      applicable_types: ["string"]
    
    - name: "uuid"
      description: "UUID 格式验证"
      template: "if !uuidRegex.MatchString({{.FieldName}}) { return errors.New(\"invalid UUID format\") }"
      applicable_types: ["string"]
    
    - name: "url"
      description: "URL 格式验证"
      template: "if !urlRegex.MatchString({{.FieldName}}) { return errors.New(\"invalid URL format\") }"
      applicable_types: ["string"]

# 文档生成配置
documentation:
  swagger:
    enabled: true
    version: "2.0"
    generate_examples: true
    include_security: true
    security_scheme: "BearerAuth"
  
  # API文档结构
  api_docs:
    title: "MathFun API"
    description: "MathFun教育平台API接口文档"
    version: "1.0.0"
    contact:
      name: "MathFun API Team"
      email: "api@mathfun.com"
    license:
      name: "MIT"
      url: "https://opensource.org/licenses/MIT"

# 中间件配置
middleware:
  # 认证中间件
  auth:
    enabled: true
    type: "jwt"  # none | jwt | casbin
    required_for_all: false
    exempt_endpoints: []
    
    # JWT 详细配置
    jwt:
      header: "Authorization"
      token_prefix: "Bearer"
      claims_key: "user_id"
      signing_method: "HS256"
      secret_env: "JWT_SECRET"
      expiration_hours: 24
      refresh_enabled: true
    
    # Casbin RBAC 配置
    casbin:
      model_path: "config/auth/rbac_with_domains.conf"
      policy_path: "config/auth/policy.csv"
      enable_auto_save: true
  
  # 限流中间件
  rate_limit:
    enabled: false
    requests_per_minute: 60
    burst: 10
  
  # 日志中间件
  logging:
    enabled: true
    level: "info"
    include_request_body: false
    include_response_body: false
  
  # CORS配置
  cors:
    enabled: true
    allow_origins: ["*"]
    allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allow_headers: ["Origin", "Content-Type", "Accept", "Authorization"]
    expose_headers: ["Content-Length"]
    allow_credentials: true

# 集成配置
integrations:
  # DDD建模助手集成
  ddd_modeling_assistant:
    enabled: true
    skill_name: "ddd-modeling-assistant"
    auto_discover_aggregates: true
    validate_before_generation: true
  
  # 错误处理构建器集成
  error_handler_builder:
    enabled: true
    skill_name: "error-handler-builder"
    apply_standard_errors: true
    custom_error_mappings: {}
  
  # API文档生成器集成
  api_doc_generator:
    enabled: true
    skill_name: "api-doc-generator"
    auto_invoke: true
    output_formats: ["json", "yaml"]
    scan_paths: ["internal/interfaces/http"]

# 模板配置
templates:
  handler_template: "templates/handler.tmpl"
  dto_template: "templates/dto.tmpl"
  router_template: "templates/router.tmpl"
  swagger_template: "templates/swagger.tmpl"
  test_template: "templates/test.tmpl"

# 代码生成选项
code_generation:
  options:
    create_unit_tests: true
    create_integration_tests: false
    generate_swagger_docs: true
    include_example_code: true
    add_detailed_comments: true
    use_struct_tags: true
  
  # 代码风格
  code_style:
    indent_size: 4
    max_line_length: 120
    use_tabs: false
    sort_imports: true

# 性能优化配置
performance:
  # 并行处理
  parallel_processing:
    enabled: true
    max_workers: 4
    chunk_size: 10
  
  # 缓存配置
  caching:
    enabled: true
    cache_size: "50MB"
    ttl: "30m"
  
  # 进度反馈
  progress_reporting:
    enabled: true
    update_interval: "1s"
    detail_level: "normal"

# 安全配置
security:
  # 输入验证
  input_validation:
    enabled: true
    max_input_length: 10000
    allowed_content_types: ["application/json"]
    sanitize_output: true
  
  # 敏感信息处理
  sensitive_data:
    filter_patterns:
      - "password"
      - "secret"
      - "token"
      - "key"
    masking_enabled: true
    masked_value: "***MASKED***"
  
  # 输出安全
  output_security:
    directory_permissions: "755"
    file_permissions: "644"
    secure_temp_files: true

# 日志配置
logging:
  level: "info"
  format: "json"
  output: "stdout"
  file_path: "logs/api-endpoint-generator.log"
  max_size: "50MB"
  max_backups: 10
  compress_old_logs: true

# 调试配置
debug:
  enabled: false
  verbose_output: false
  dump_intermediate_states: false
  profile_performance: false
  trace_executions: false

# 版本信息
version: "1.0.0"
created: "2026-01-26"
updated: "2026-01-26"
maintainer: "MathFun Team"