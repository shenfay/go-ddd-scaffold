# Wire Auto Generator Skill Configuration

name: wire-auto-generator
version: 1.0.0
description: Wire 依赖注入自动化生成工具 - 一键生成 Wire 代码并诊断常见问题
author: DDD Scaffold Team

## Triggers

- /wire-auto-generator
- /wire-gen
- /generate-wire
- Wire 自动生成
- Wire 依赖注入配置
- 生成 wire_gen.go

## Capabilities

- wire_config_check: 检查 Wire 配置完整性
- wire_code_generation: 生成 wire_gen.go 代码
- error_diagnosis: 诊断编译错误
- best_practices_guide: 提供最佳实践建议
- auto_fix: 自动修复可修复的问题

## Parameters

- path: 
    type: string
    description: Wire 配置文件所在目录路径
    default: ./backend/internal/infrastructure/wire
    
- dry_run:
    type: boolean
    description: 仅检查，不生成代码
    default: false
    
- verbose:
    type: boolean
    description: 详细输出模式
    default: false
    
- auto_fix:
    type: boolean
    description: 自动修复可修复的问题
    default: true

## Workflow

1. check_environment
   - 检查 Go 环境
   - 检查 Wire 是否安装
   - 检查项目结构

2. analyze_config
   - 扫描 injector.go
   - 分析 Provider Set
   - 检查类型导出情况
   - 检测循环依赖

3. generate_code
   - 运行 wire gen
   - 验证生成的 wire_gen.go
   - 检查语法正确性

4. verify_compilation
   - go build 编译测试
   - 检查导入完整性
   - 验证依赖注入

5. fix_issues (if needed)
   - 诊断错误类型
   - 提供修复方案
   - 自动修复（如可能）
   - 手动修复指导

## Examples

### Example 1: 基本使用
User: /wire-auto-generator
Assistant: 开始检查 Wire 配置...

### Example 2: 指定目录
User: /wire-auto-generator ./backend/internal/infrastructure/wire
Assistant: 正在分析 ./backend/internal/infrastructure/wire 目录...

### Example 3: 仅检查
User: /wire-auto-generator --dry-run
Assistant: 进入检查模式，不会生成代码...

### Example 4: 自动修复
User: /wire-auto-generator --auto-fix
Assistant: 启用自动修复模式，将尝试修复可修复的问题...

## Error Handling

- wire_not_found: 提示安装 Wire
- config_error: 提供配置模板
- compilation_error: 诊断并修复
- cycle_dependency: 提供重构建议

## Output Format

success: |
  ✅ Wire 配置检查通过
  🚀 开始生成 Wire 代码...
  ✅ wire: wrote wire_gen.go
  ✅ go build 编译通过
  
failure: |
  ❌ Wire 配置检查发现问题
  
  问题 1: [错误类型]
  📍 位置：[文件：行号]
  💡 原因：[详细说明]
  🔧 修复方案：[具体步骤]

