app:
  name: "Go DDD Scaffold"
  port: 8080
  env: "development"

database:
  host: "localhost"
  port: 5432
  user: "shenfay"
  password: "postgres"
  dbname: "go_ddd_scaffold"
  sslmode: "disable"
  
  # 数据库连接池配置（生产环境优化）
  max_idle_conns: 10          # 最大空闲连接数
  max_open_conns: 100         # 最大打开连接数
  conn_max_lifetime: 1h       # 连接最大生命周期
  conn_max_idle_time: 5m      # 连接最大空闲时间

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100              # 连接池大小
  min_idle_conns: 10          # 最小空闲连接数
  
  # EventBus 配置
  event_bus:
    stream_key: "domain_events"
    max_retries: 3
    retry_base_delay: 1s
    poll_interval: 5s
    batch_size: 100

jwt:
  secret_key: "mathfun-jwt-secret-key-2026-change-in-production"
  expire_in: 24h

log:
  level: "info"

