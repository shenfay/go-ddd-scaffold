groups:
  - name: AsynqTaskQueueAlerts
    interval: 30s
    rules:
      # 1. 高失败率告警
      - alert: AsynqHighFailureRate
        expr: sum(rate(asynq_tasks_processed_total{status="failed"}[5m])) by (task_type) / sum(rate(asynq_tasks_processed_total[5m])) by (task_type) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Asynq 任务失败率过高"
          description: "任务类型 {{ $labels.task_type }} 的失败率为 {{ $value | humanizePercentage }}，超过阈值 5%"
      
      # 2. 队列积压告警
      - alert: AsynqQueueBacklog
        expr: asynq_queue_size > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Asynq 队列积压严重"
          description: "队列 {{ $labels.queue }} 积压了 {{ $value }} 个任务，超过阈值 1000"
      
      # 3. 关键队列积压告警（更高优先级）
      - alert: AsynqCriticalQueueBacklog
        expr: asynq_queue_size{queue=~"notifications_critical.*"} > 100
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Asynq 关键队列积压"
          description: "关键队列 {{ $labels.queue }} 积压了 {{ $value }} 个任务，超过阈值 100"
      
      # 4. 任务处理延迟过高
      - alert: AsynqHighLatency
        expr: histogram_quantile(0.99, rate(asynq_task_processing_duration_seconds_bucket[5m])) > 60
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Asynq 任务处理延迟过高"
          description: "任务类型 {{ $labels.task_type }} 的 P99 延迟为 {{ $value | humanizeDuration }}，超过阈值 60 秒"
      
      # 5. Worker 停止工作
      - alert: AsynqWorkerDown
        expr: up{job="worker"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Asynq Worker 已停止"
          description: "Worker 实例 {{ $labels.instance }} 已经停止工作超过 1 分钟"
      
      # 6. Outbox 处理器积压
      - alert: AsynqOutboxBacklog
        expr: delta(asynq_queue_size{queue="jobs_realtime"}[10m]) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Asynq Outbox 处理器积压"
          description: "实时任务队列在过去 10 分钟内增长了 {{ $value }} 个任务"
      
      # 7. 通知队列失败率高
      - alert: AsynqNotificationFailureRate
        expr: sum(rate(asynq_tasks_processed_total{status="failed", task_type=~"notification:.*"}[5m])) by (task_type) / sum(rate(asynq_tasks_processed_total{task_type=~"notification:.*"}[5m])) by (task_type) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Asynq 通知任务失败率过高"
          description: "通知任务 {{ $labels.task_type }} 的失败率为 {{ $value | humanizePercentage }}，超过阈值 10%"
      
      # 8. 定时任务未执行
      - alert: AsynqScheduledJobNotRunning
        expr: rate(asynq_tasks_processed_total{task_type=~"job:scheduled:.*"}[1h]) < 0.5
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "Asynq 定时任务可能未执行"
          description: "定时任务 {{ $labels.task_type }} 在过去 2 小时内执行次数少于 1 次"
      
      # 9. Redis 连接问题
      - alert: AsynqRedisConnectionIssue
        expr: rate(asynq_redis_connection_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Asynq Redis 连接错误"
          description: "Redis 连接错误率：{{ $value }}/s"
      
      # 10. 并发度过低
      - alert: AsynqLowConcurrency
        expr: asynq_worker_concurrency < 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Asynq Worker 并发度过低"
          description: "当前并发度为 {{ $value }}，低于建议值 5"
