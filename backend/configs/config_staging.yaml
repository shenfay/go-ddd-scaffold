server:
  port: "8080"
  mode: "release"
  read_timeout: "45s"
  write_timeout: "45s"

database:
  host: "${DB_HOST}"
  port: "${DB_PORT}"
  name: "${DB_NAME}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  max_idle_conns: 10
  max_open_conns: 50

redis:
  addr: "${REDIS_ADDR}"
  password: "${REDIS_PASSWORD}"

jwt:
  secret: "${JWT_SECRET}"
  access_expire: 30m
  refresh_expire: 168h

logging:
  level: "info"
  format: "json"
  file: "/var/log/scaffold/staging.log"