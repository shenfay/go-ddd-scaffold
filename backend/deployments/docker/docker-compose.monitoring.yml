version: '3.8'

services:
  # Prometheus - 指标采集和告警
  prometheus:
    image: prom/prometheus:latest
  container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
  command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
   ports:
      - "9090:9090"
   networks:
      - monitoring
    restart: unless-stopped

  # Grafana - 可视化仪表盘
  grafana:
    image: grafana/grafana:latest
  container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
   environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana_admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
   ports:
      - "3000:3000"
   networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  # AlertManager - 告警管理
  alertmanager:
    image: prom/alertmanager:latest
  container_name: alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
  command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
      - '--cluster.listen-address='
   ports:
      - "9093:9093"
   networks:
      - monitoring
    restart: unless-stopped

  # Node Exporter - 系统指标
  node-exporter:
    image: prom/node-exporter:latest
  container_name: node-exporter
  command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.ignored-mount-points="^/(sys|proc|dev|host|etc)($$|/)"'
    volumes:
      - '/:/host:ro,rslave'
    pid: host
   ports:
      - "9100:9100"
   networks:
      - monitoring
    restart: unless-stopped

  # MySQL Exporter - 数据库监控
  mysqld-exporter:
    image: prom/mysqld-exporter:latest
  container_name: mysqld-exporter
   environment:
      - DATA_SOURCE_NAME=root:root@(mysql:3306)/go_ddd_scaffold
   ports:
      - "9104:9104"
   networks:
      - monitoring
    depends_on:
      - mysql
    restart: unless-stopped

  # Backend Application - 被监控应用
  backend:
    build:
    context: ../../..
      dockerfile: backend/deployments/docker/Dockerfile
  container_name: backend-app
   environment:
      - SERVER_PORT=8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=go_ddd_scaffold
      - JWT_SECRET=your-secret-key
      - SERVER_MODE=release
   ports:
      - "8080:8080"
   networks:
      - monitoring
    depends_on:
      - mysql
    restart: unless-stopped
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8080"
      - "prometheus.path=/metrics"

  # MySQL Database
  mysql:
    image: mysql:8.0
  container_name: mysql
   environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=go_ddd_scaffold
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=app_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../../migrations/sql:/docker-entrypoint-initdb.d
   ports:
      - "3306:3306"
   networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  prometheus_data:
   driver: local
  grafana_data:
   driver: local
  alertmanager_data:
   driver: local
  mysql_data:
   driver: local

networks:
  monitoring:
   driver: bridge
