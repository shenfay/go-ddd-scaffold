# 错误处理构建器配置文件
# 遵循 MathFun 项目规范和错误处理最佳实践

# 协同工作流配置
coordination:
  # 在协同工作流中的角色
  role: "error_handling_layer"
  # 输入数据格式
  input_formats: 
    - "domain_model_json"
    - "api_endpoints"
  # 输出数据格式
  output_format: "error_handlers"
  # 依赖的Skills（上游）
  dependencies: 
    - "ddd-modeling-assistant"
    - "api-endpoint-generator"
  # 被依赖的Skills（下游）
  dependents: 
    - "api-endpoint-generator"
    - "api-doc-generator"

error_handling:
  # 响应格式配置
  response_format:
    standard: true
    include_stack_trace: false
    include_error_id: true
    mask_sensitive_data: true
    sensitive_field_patterns:
      - "password"
      - "secret"
      - "token"
      - "key"
      - "credential"
  
  # 错误分类配置
  error_categories:
    business_errors:
      prefix: "BUSINESS_"
      log_level: "warn"
      http_status: 400
      description: "业务逻辑相关错误"
      
    system_errors:
      prefix: "SYSTEM_"
      log_level: "error"
      http_status: 500
      description: "系统级错误"
      
    validation_errors:
      prefix: "VALIDATION_"
      log_level: "info"
      http_status: 400
      description: "输入验证错误"
      
    authentication_errors:
      prefix: "AUTH_"
      log_level: "warn"
      http_status: 401
      description: "认证相关错误"
      
    authorization_errors:
      prefix: "PERMISSION_"
      log_level: "warn"
      http_status: 403
      description: "授权相关错误"
      
    external_errors:
      prefix: "EXTERNAL_"
      log_level: "error"
      http_status: 502
      description: "第三方服务错误"

  # 错误码定义
  error_codes:
    # 业务错误
    BUSINESS_USER_NOT_FOUND:
      category: "business_errors"
      message_zh: "用户不存在"
      message_en: "User not found"
      http_status: 404
      
    BUSINESS_RESOURCE_NOT_FOUND:
      category: "business_errors"
      message_zh: "资源不存在"
      message_en: "Resource not found"
      http_status: 404
      
    BUSINESS_INSUFFICIENT_FUNDS:
      category: "business_errors"
      message_zh: "余额不足"
      message_en: "Insufficient funds"
      http_status: 400
      
    # 系统错误
    SYSTEM_DATABASE_FAILURE:
      category: "system_errors"
      message_zh: "数据库操作失败"
      message_en: "Database operation failed"
      http_status: 500
      
    SYSTEM_SERVICE_TIMEOUT:
      category: "system_errors"
      message_zh: "服务调用超时"
      message_en: "Service call timeout"
      http_status: 504
      
    SYSTEM_INTERNAL_SERVER:
      category: "system_errors"
      message_zh: "内部服务器错误"
      message_en: "Internal server error"
      http_status: 500
      
    # 验证错误
    VALIDATION_INVALID_INPUT:
      category: "validation_errors"
      message_zh: "输入参数无效"
      message_en: "Invalid input parameters"
      http_status: 400
      
    VALIDATION_MISSING_REQUIRED:
      category: "validation_errors"
      message_zh: "缺少必填参数"
      message_en: "Missing required parameters"
      http_status: 400

# 日志配置
logging:
  enabled: true
  format: "json"
  levels: ["debug", "info", "warn", "error"]
  include_context: true
  context_fields:
    - "request_id"
    - "user_id"
    - "trace_id"
    - "span_id"
    - "service_name"
  
  # 日志输出配置
  outputs:
    console:
      enabled: true
      level: "info"
    file:
      enabled: true
      path: "logs/errors.log"
      max_size: "100MB"
      max_backups: 10
      compress: true
    remote:
      enabled: false
      endpoint: "http://localhost:9090/api/logs"

# 监控集成配置
monitoring:
  # Prometheus指标
  prometheus:
    enabled: true
    metrics_prefix: "mathfun_"
    error_counter_name: "errors_total"
    error_histogram_name: "error_handling_duration_seconds"
    labels:
      - "error_category"
      - "error_code"
      - "service_name"
      - "endpoint"
  
  # 告警配置
  alerting:
    enabled: true
    system: "prometheus"
    rules:
      - name: "high_error_rate"
        expr: "rate(mathfun_errors_total[5m]) > 10"
        for: "1m"
        labels:
          severity: "warning"
        annotations:
          summary: "High error rate detected"
          description: "Error rate exceeds threshold of 10 errors per minute"
          
      - name: "critical_system_error"
        expr: "mathfun_errors_total{category='system_errors'} > 0"
        for: "30s"
        labels:
          severity: "critical"
        annotations:
          summary: "Critical system error occurred"
          description: "A critical system error has been detected"
          
      - name: "authentication_failure_spike"
        expr: "rate(mathfun_errors_total{category='authentication_errors'}[1m]) > 5"
        for: "30s"
        labels:
          severity: "warning"
        annotations:
          summary: "Authentication failure spike"
          description: "Unusual number of authentication failures detected"

# 多语言支持
localization:
  enabled: true
  default_language: "zh"
  supported_languages: ["zh", "en"]
  message_sources:
    zh: "locales/zh/errors.yaml"
    en: "locales/en/errors.yaml"
  
  # 消息模板
  templates:
    business_error: "{{.Message}} (错误码: {{.Code}})"
    system_error: "{{.Message}} (系统错误)"
    validation_error: "{{.Message}} (字段: {{.Field}})"

# 性能优化配置
performance:
  # 对象池化
  object_pooling:
    enabled: true
    error_object_pool_size: 1000
    buffer_pool_size: 500
    
  # 异步处理
  async_processing:
    enabled: true
    worker_count: 4
    queue_size: 10000
    batch_size: 100
    
  # 采样配置
  sampling:
    enabled: true
    rate: 0.1  # 10%采样率
    sample_by_severity: true
    high_severity_threshold: "error"

# 安全配置
security:
  # 敏感信息处理
  sensitive_data:
    redact_enabled: true
    redact_patterns:
      - "password.*"
      - "secret.*"
      - "token.*"
      - "key.*"
      - "credential.*"
    redacted_value: "***REDACTED***"
  
  # 输出安全
  output_security:
    max_error_message_length: 1000
    allow_stack_trace: false
    include_internal_details: false

# 集成配置
integrations:
  # API端点生成器集成
  api_endpoint_generator:
    enabled: true
    skill_name: "api-endpoint-generator"
    auto_apply_to_generated_apis: true
    error_middleware_template: "middleware/error_handler.tmpl"
  
  # DDD建模助手集成
  ddd_modeling_assistant:
    enabled: true
    skill_name: "ddd-modeling-assistant"
    extract_business_rules_for_errors: true
    generate_domain_specific_errors: true
  
  # 日志系统集成
  logging_system:
    system: "zap"
    structured_logging: true
    correlation_id_header: "X-Request-ID"

# 模板配置
templates:
  error_types_template: "templates/error_types.tmpl"
  error_factory_template: "templates/error_factory.tmpl"
  middleware_template: "templates/middleware.tmpl"
  logger_template: "templates/logger.tmpl"
  metrics_template: "templates/metrics.tmpl"

# 代码生成选项
code_generation:
  options:
    create_unit_tests: true
    create_integration_tests: false
    generate_documentation: true
    include_example_code: true
    add_detailed_comments: true
  
  # 代码风格
  code_style:
    indent_size: 4
    max_line_length: 120
    use_tabs: false
    sort_imports: true

# 调试配置
debug:
  enabled: false
  verbose_output: false
  dump_error_context: false
  trace_error_propagation: false
  profile_performance: false

# 版本信息
version: "1.0.0"
created: "2026-01-26"
updated: "2026-01-26"
maintainer: "MathFun Team"