# Frontend Scaffold 配置文件
# React 五层架构脚手架生成工具

# 协同工作流配置
coordination:
  role: "frontend_architecture"
  input_format: "domain_model_json"
  output_format: "react_project_structure"
  dependencies: 
    - "ddd-modeling-assistant"
  dependents: 
    - "api-endpoint-generator"

# 项目模板配置
templates:
  education:
    name: "教育科技模板"
    description: "儿童友好的教育应用模板"
    features:
      - threejs
      - framer-motion
      - katex
      - child-friendly-ui
    
  dashboard:
    name: "管理后台模板"
    description: "数据可视化管理后台"
    features:
      - charts
      - tables
      - admin-layout
    
  landing:
    name: "落地页模板"
    description: "产品宣传落地页"
    features:
      - hero-section
      - features
      - testimonials

# 技术栈配置
tech_stack:
  react:
    version: "^18.2.0"
    required: true
  
  vite:
    version: "^4.4.0"
    required: true
  
  tailwind:
    version: "^3.3.0"
    required: true
  
  zustand:
    version: "^4.4.0"
    required: true
  
  react_router:
    version: "^6.15.0"
    required: true
  
  framer_motion:
    version: "^10.16.0"
    required: false
  
  threejs:
    version: "^0.155.0"
    packages:
      - "@react-three/fiber@^8.15.0"
      - "@react-three/drei@^9.80.0"
      - "three@^0.155.0"
    required: false
  
  pwa:
    version: "^7.0.0"
    packages:
      - "vite-plugin-pwa"
    required: false

# 五层架构配置
five_layer_architecture:
  presentation:
    directories:
      - pages
      - components/ui
      - components/layouts
      - routes
      - styles
      - assets
    description: "纯 UI 渲染，不包含业务逻辑"
  
  interaction:
    directories:
      - three/scenes
      - three/models
      - components
      - hooks
    description: "处理用户交互反馈、3D 场景控制"
  
  business:
    directories:
      - store/slices
      - models
      - services
    description: "定义业务规则、管理全局状态"
  
  data:
    directories:
      - api
      - endpoints
      - mappers
      - repositories
    description: "API 调用、数据获取和转换"
  
  shared:
    directories:
      - utils
      - constants
      - locales
      - types
      - hooks
      - themes
    description: "共享工具、常量、类型定义"

# 儿童友好设计配置
child_friendly_design:
  colors:
    primary: "#60a5fa"  # 明亮蓝色
    success: "#22c55e"  # 成功绿色
    warning: "#f59e0b"  # 警告黄色
    error: "#ef4444"    # 错误红色
  
  fonts:
    base_size: "18px"
    scale_ratio: 1.2
  
  spacing:
    base: "8px"
    scale: [4, 8, 12, 16, 24, 32, 48, 64]
  
  border_radius:
    small: "0.5rem"
    default: "0.75rem"
    large: "1.5rem"
    xl: "2rem"
  
  animations:
    duration_fast: "150ms"
    duration_normal: "300ms"
    duration_slow: "500ms"
    easing: "cubic-bezier(0.4, 0, 0.2, 1)"

# 代码生成配置
generation:
  file_extensions:
    component: ".jsx"
    style: ".css"
    typescript: ".ts"
    typescript_react: ".tsx"
  
  naming_conventions:
    component: "PascalCase"
    file: "PascalCase"
    function: "camelCase"
    constant: "UPPER_SNAKE_CASE"
  
  code_templates:
    component: |
      // {{name}} 组件
      // 职责：{{description}}
      
      export default function {{name}}() {
        return (
          <div className="{{className}}">
            {/* TODO: 实现组件内容 */}
          </div>
        )
      }
    
    page: |
      // {{name}} 页面组件
      // 职责：纯 UI 渲染
      
      import { use{{name}}Store } from '@business/store'
      
      export default function {{name}}() {
        // 从业务层获取数据
        const { data } = use{{name}}Store()
        
        return (
          <div className="min-h-screen p-8">
            <h1 className="text-4xl font-bold mb-8">{{name}}</h1>
            {/* TODO: 实现页面内容 */}
          </div>
        )
      }
    
    store: |
      // {{name}} Store
      import { create } from 'zustand'
      
      const {{name}}Store = create((set) => ({
        // State
        data: null,
        
        // Actions
        setData: (data) => set({ data }),
        resetData: () => set({ data: null }),
      }))
      
      export const use{{name}}Store = () => {{name}}Store((state) => state)
      export default {{name}}Store

# 验证配置
validation:
  node_version: ">=16"
  required_files:
    - package.json
    - vite.config.js
    - tailwind.config.js
    - index.html
    - src/main.jsx
    - src/App.jsx
  
  optional_files:
    - tsconfig.json
    - .eslintrc.cjs
    - postcss.config.js

# 日志配置
logging:
  level: info
  format: text
  output: stdout

# 功能开关
features:
  auto_install_deps: false
  git_init: true
  create_gitignore: true
  interactive_mode: true

# 版本信息
version: "1.0.0"
created: "2026-02-25"
