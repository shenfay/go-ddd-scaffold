# API文档生成器配置文件
# 遵循 MathFun 项目规范和最佳实践

# 协同工作流配置
coordination:
  # 在协同工作流中的角色
  role: "documentation_layer"
  # 输入数据格式
  input_formats: 
    - "api_endpoints"
    - "error_handlers"
  # 输出数据格式
  output_format: "api_documentation"
  # 依赖的Skills（上游）
  dependencies: 
    - "api-endpoint-generator"
    - "error-handler-builder"
  # 被依赖的Skills（下游）
  dependents: []

api:
  # 扫描路径配置
  scan_paths:
    - backend/internal/interfaces/http
    - backend/cmd/server
    - backend/pkg/api
  
  # 输出配置
  output:
    formats: [json, yaml]            # 支持的输出格式（移除html）
    directory: backend/docs          # 输出目录
    filename: swagger                # 基础文件名
  
  # Swagger配置
  swagger:
    version: "2.0"
    info:
      title: "MathFun API Documentation"
      description: "数学教育平台API接口文档"
      version: "1.0.0"
      contact:
        name: "MathFun开发团队"
        email: "dev@mathfun.com"
        url: "https://mathfun.com"
    
    # 服务器配置
    host: "api.mathfun.com"
    base_path: "/v1"
    schemes: [https]
    consumes: [application/json]
    produces: [application/json]
  
  # 注释解析配置
  parsing:
    include_examples: true           # 是否包含示例数据
    parse_structs: true              # 是否解析结构体注释
    required_tags: [summary]         # 必需的注释标签
    max_description_length: 1000     # 描述最大长度
    validate_required_fields: true   # 验证必需字段

# 代码质量检查配置
validation:
  enabled: true
  strict_mode: false                 # 严格模式
  rules:
    - require_summary                # 必需summary描述
    - require_description            # 必需详细描述
    - validate_param_types           # 验证参数类型
    - validate_response_types        # 验证响应类型
    - check_duplicate_routes         # 检查重复路由
    - validate_example_formats       # 验证示例格式
    - check_security_definitions     # 检查安全定义
  
  # 质量评分配置
  quality_scores:
    completeness: 40                 # 完整性权重
    accuracy: 30                     # 准确性权重
    consistency: 20                  # 一致性权重
    readability: 10                  # 可读性权重

# 自定义字段配置
custom_fields:
  # 业务相关字段
  - x-business-domain: "业务领域"
  - x-business-owner: "业务负责人"
  - x-api-category: "API分类"
  
  # 技术相关字段
  - x-implementation-language: "实现语言"
  - x-framework-version: "框架版本"
  - x-deprecated-since: "废弃版本"
  
  # 运维相关字段
  - x-monitoring-enabled: "监控启用"
  - x-rate-limit: "速率限制"
  - x-cache-strategy: "缓存策略"

# 模板配置（简化，不再需要HTML模板）
templates:
  # Swagger模板
  swagger:
    template_path: templates/swagger.tmpl
    default_values:
      title: "API Documentation"
      version: "1.0.0"

# 性能优化配置
performance:
  parallel_processing: true          # 并行处理
  max_workers: 4                     # 最大工作线程数
  cache_enabled: true                # 启用缓存
  incremental_scan: true             # 增量扫描
  skip_unchanged_files: true         # 跳过未变更文件

# 安全配置
security:
  # 敏感信息过滤
  filter_sensitive:
    - password
    - token
    - secret
    - key
    - authorization
  
  # 输出目录权限
  output_permissions: "755"
  
  # 环境变量安全
  secure_env_vars: true

# 集成配置
integration:
  # Git集成
  git_hooks:
    pre_commit: false
    post_merge: false
  
  # CI/CD集成
  ci_cd:
    github_actions: true
    gitlab_ci: false
    jenkins: false
  
  # 监控集成
  monitoring:
    prometheus: false
    datadog: false
    new_relic: false

# 日志配置
logging:
  level: info                        # 日志级别：debug/info/warn/error
  format: json                       # 日志格式：json/text
  output: stdout                     # 输出目标：stdout/file/both
  file_path: logs/api-doc-generator.log
  max_size: "10MB"                   # 最大文件大小
  max_backups: 5                     # 最大备份数量

# 版本信息
version: "1.0.0"
created: "2026-01-26"
updated: "2026-03-05"
maintainer: "Go DDD Scaffold"