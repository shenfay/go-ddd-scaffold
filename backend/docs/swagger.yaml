definitions:
  go-ddd-scaffold_internal_application_tenant_dto.CreateTenantRequest:
    properties:
      description:
        maxLength: 500
        type: string
      maxMembers:
        minimum: 1
        type: integer
      name:
        maxLength: 100
        type: string
    required:
    - maxMembers
    - name
    type: object
  go-ddd-scaffold_internal_application_user_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  go-ddd-scaffold_internal_application_user_dto.LoginResponse:
    properties:
      accessToken:
        type: string
      user:
        $ref: '#/definitions/go-ddd-scaffold_internal_application_user_dto.User'
    type: object
  go-ddd-scaffold_internal_application_user_dto.RegisterRequest:
    properties:
      email:
        type: string
      nickname:
        type: string
      password:
        minLength: 6
        type: string
      role:
        description: 可选，默认为 member
        enum:
        - member
        - guest
        type: string
      tenantId:
        type: string
    required:
    - email
    - nickname
    - password
    type: object
  go-ddd-scaffold_internal_application_user_dto.UpdateProfileRequest:
    properties:
      bio:
        type: string
      nickname:
        type: string
      phone:
        type: string
    type: object
  go-ddd-scaffold_internal_application_user_dto.UpdateUserRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      status:
        enum:
        - ACTIVE
        - INACTIVE
        - SUSPENDED
        type: string
    type: object
  go-ddd-scaffold_internal_application_user_dto.User:
    properties:
      avatar:
        type: string
      bio:
        type: string
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      nickname:
        type: string
      phone:
        type: string
      role:
        type: string
      status:
        type: string
      tenantId:
        type: string
      updatedAt:
        type: string
    type: object
  go-ddd-scaffold_internal_pkg_response.ErrorInfo:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  go-ddd-scaffold_internal_pkg_response.Response:
    properties:
      code:
        type: string
      data: {}
      error:
        $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.ErrorInfo'
      message:
        type: string
      requestId:
        type: string
      timestamp:
        type: string
    type: object
info:
  contact: {}
  description: |
    DDD 架构脚手架项目 API文档

    ## 认证模块
    - POST /api/auth/register 用户注册
    - POST /api/auth/login 用户登录
    - POST /api/auth/logout 用户登出

    ## 用户管理
    - GET /api/users/:id 获取用户信息
    - PUT /api/users/:id 更新用户信息

    ## 个人资料
    - GET /api/users/info 获取当前用户信息
    - PUT /api/users/profile 更新个人资料

    ## 租户管理
    - POST /api/tenants 创建租户
    - GET /api/tenants/my-tenants 获取用户的租户列表
  title: go-ddd-scaffold API
  version: "1.0"
paths:
  /api/tenants:
    post:
      consumes:
      - application/json
      description: 创建新的租户，创建者自动成为 owner
      parameters:
      - description: 租户信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-ddd-scaffold_internal_application_tenant_dto.CreateTenantRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 创建成功
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
      summary: 创建租户
      tags:
      - tenants
  /api/tenants/my-tenants:
    get:
      consumes:
      - application/json
      description: 获取当前登录用户所属的所有租户及其角色
      produces:
      - application/json
      responses:
        "200":
          description: 租户列表
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/go-ddd-scaffold_internal_pkg_response.Response'
      summary: 获取用户的租户列表
      tags:
      - tenants
swagger: "2.0"
