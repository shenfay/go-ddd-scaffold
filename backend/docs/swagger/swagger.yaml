basePath: /api/v1
definitions:
  github_com_shenfay_go-ddd-scaffold_internal_application_auth.AuthenticateCommand:
    properties:
      identifier:
        description: 用户名或邮箱
        type: string
      ip_address:
        type: string
      password:
        type: string
      user_agent:
        type: string
    type: object
  github_com_shenfay_go-ddd-scaffold_internal_application_auth.AuthenticateResult:
    properties:
      access_token:
        type: string
      email:
        type: string
      expires_in:
        description: 过期时间（秒）
        type: integer
      refresh_token:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  github_com_shenfay_go-ddd-scaffold_internal_application_auth.RefreshTokenCommand:
    properties:
      current_token:
        type: string
      ip_address:
        type: string
      refresh_token:
        type: string
      user_agent:
        type: string
    type: object
  github_com_shenfay_go-ddd-scaffold_internal_application_auth.RefreshTokenResult:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
    type: object
  github_com_shenfay_go-ddd-scaffold_internal_application_auth.RegisterCommand:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  github_com_shenfay_go-ddd-scaffold_internal_application_auth.RegisterResult:
    properties:
      email:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  github_com_shenfay_go-ddd-scaffold_internal_application_auth.UserInfoResult:
    properties:
      display_name:
        type: string
      email:
        type: string
      id:
        type: integer
      status:
        type: string
      username:
        type: string
    type: object
  github_com_shenfay_go-ddd-scaffold_internal_application_user_usecase.ChangePasswordCommand:
    properties:
      ipaddress:
        type: string
      newPassword:
        type: string
      oldPassword:
        type: string
      userID:
        $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_domain_user_valueobject.UserID'
    type: object
  github_com_shenfay_go-ddd-scaffold_internal_application_user_usecase.UpdateProfileCommand:
    properties:
      displayName:
        type: string
      firstName:
        type: string
      gender:
        allOf:
        - $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_domain_user_valueobject.UserGender'
        description: 指针类型支持可选参数
      lastName:
        type: string
      phoneNumber:
        type: string
      userID:
        $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_domain_user_valueobject.UserID'
    type: object
  github_com_shenfay_go-ddd-scaffold_internal_domain_user_aggregate.User:
    type: object
  github_com_shenfay_go-ddd-scaffold_internal_domain_user_valueobject.UserGender:
    enum:
    - 0
    - 1
    - 2
    - 3
    type: integer
    x-enum-varnames:
    - UserGenderUnknown
    - UserGenderMale
    - UserGenderFemale
    - UserGenderOther
  github_com_shenfay_go-ddd-scaffold_internal_domain_user_valueobject.UserID:
    type: object
  github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse:
    description: API 统一响应格式
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      trace_id:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: Go DDD Scaffold API 文档 - 基于 DDD 和 CQRS 的企业级脚手架
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Go DDD Scaffold API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名或邮箱和密码进行登录，获取访问令牌
      parameters:
      - description: 登录凭证
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_application_auth.AuthenticateCommand'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功返回令牌和用户信息
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_application_auth.AuthenticateResult'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
        "401":
          description: 认证失败
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
      summary: 用户登录
      tags:
      - 认证
  /auth/logout:
    post:
      consumes:
      - application/json
      description: 使当前访问令牌失效
      produces:
      - application/json
      responses:
        "204":
          description: 登出成功
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - 认证
  /auth/me:
    get:
      consumes:
      - application/json
      description: 获取当前登录用户的信息
      produces:
      - application/json
      responses:
        "200":
          description: 当前用户信息
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_application_auth.UserInfoResult'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
      security:
      - BearerAuth: []
      summary: 获取当前用户
      tags:
      - 认证
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌
      parameters:
      - description: 刷新令牌
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_application_auth.RefreshTokenCommand'
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功返回新令牌
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_application_auth.RefreshTokenResult'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
        "401":
          description: 令牌无效
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
      summary: 刷新访问令牌
      tags:
      - 认证
  /auth/register:
    post:
      consumes:
      - application/json
      description: 创建新用户账户
      parameters:
      - description: 用户注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_application_auth.RegisterCommand'
      produces:
      - application/json
      responses:
        "201":
          description: 注册成功返回用户信息
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_application_auth.RegisterResult'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
        "409":
          description: 用户已存在
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
      summary: 用户注册
      tags:
      - 认证
  /users/{id}:
    get:
      consumes:
      - application/json
      description: 根据用户 ID 获取用户详细信息
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 用户详情
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_domain_user_aggregate.User'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
      summary: 获取用户详情
      tags:
      - 用户管理
    put:
      consumes:
      - application/json
      description: 更新指定用户的详细信息（部分更新）
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: string
      - description: 用户更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_application_user_usecase.UpdateProfileCommand'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
      summary: 更新用户信息
      tags:
      - 用户管理
  /users/{id}/password:
    put:
      consumes:
      - application/json
      description: 修改指定用户的登录密码
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: string
      - description: 原密码和新密码
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_application_user_usecase.ChangePasswordCommand'
      produces:
      - application/json
      responses:
        "204":
          description: 修改成功
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/github_com_shenfay_go-ddd-scaffold_internal_interfaces_http.APIResponse'
      summary: 修改用户密码
      tags:
      - 用户管理
securityDefinitions:
  BearerAuth:
    description: 在 Header 中输入：Bearer {token}
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
