<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安心食光 - 首页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #F0F0F0;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    }
    :root {
      --forest-green: #2E7D32;
      --warm-sand: #F9F8F4;
      --text-primary: #1A1A1A;
      --text-secondary: #666666;
      --text-light: #999999;
      --border-light: #E8E8E8;
    }
    .phone-frame {
      width: 375px;
      min-height: 812px;
      background: var(--warm-sand);
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .status-bar {
      height: 44px;
      background: var(--warm-sand);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      font-size: 12px;
      color: var(--text-primary);
    }
    .home-header {
      background: white;
      padding: 16px;
      border-bottom: 1px solid var(--border-light);
    }
    .home-header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .user-avatar { display: flex; align-items: center; gap: 12px; }
    .avatar-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--forest-green);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      font-weight: 500;
    }
    .user-info { display: flex; flex-direction: column; }
    .user-name { font-size: 16px; font-weight: 500; color: var(--text-primary); }
    .user-role { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .header-icons { display: flex; gap: 16px; }
    .icon-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }
    .scan-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
    }
    .scan-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--forest-green);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .scan-btn svg { margin-bottom: 8px; }
    .scan-text { font-size: 14px; font-weight: 500; }
    .scan-hint { font-size: 13px; color: var(--text-secondary); }
    .page-content { padding: 16px; padding-bottom: 80px; }
    .section-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-more { font-size: 13px; color: var(--forest-green); font-weight: 400; }
    .scan-history {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      margin-bottom: 24px;
      padding-bottom: 8px;
    }
    .history-card {
      min-width: 140px;
      background: white;
      border-radius: 8px;
      padding: 12px;
      border: 1px solid var(--border-light);
    }
    .history-dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 8px; }
    .history-dot.red { background: #E53935; }
    .history-dot.yellow { background: #FFA000; }
    .history-dot.green { background: var(--forest-green); }
    .history-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-time { font-size: 11px; color: var(--text-light); }
    .quick-entry {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .entry-card {
      background: white;
      border-radius: 8px;
      padding: 16px 12px;
      text-align: center;
      border: 1px solid var(--border-light);
    }
    .entry-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #E8F5E9;
      border-radius: 8px;
      color: var(--forest-green);
    }
    .entry-name { font-size: 13px; color: var(--text-primary); }
    .tip-card {
      background: white;
      border-radius: 8px;
      padding: 16px;
      border: 1px solid var(--border-light);
      margin-bottom: 12px;
    }
    .tip-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .tip-icon { font-size: 20px; }
    .tip-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .tip-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .tab-bar {
      display: flex;
      background: white;
      border-top: 1px solid var(--border-light);
      padding: 8px 0;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-light);
      font-size: 11px;
      cursor: pointer;
    }
    .tab-item.active { color: var(--forest-green); }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">
      <span>9:41</span>
      <span>●●●●</span>
    </div>
    <div class="home-header">
      <div class="home-header-top">
        <div class="user-avatar">
          <div class="avatar-circle">张</div>
          <div class="user-info">
            <span class="user-name">张妈妈</span>
            <span class="user-role">个人档案</span>
          </div>
        </div>
        <div class="header-icons">
          <div class="icon-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
          </div>
        </div>
      </div>
      <div class="scan-section">
        <div class="scan-btn">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          <span class="scan-text">扫码识别</span>
        </div>
        <span class="scan-hint">对准食品包装,3秒识别</span>
      </div>
    </div>
    <div class="page-content">
      <div class="section-title">
        <span>最近扫描</span>
        <span class="section-more">查看全部</span>
      </div>
      <div class="scan-history">
        <div class="history-card">
          <div class="history-dot red"></div>
          <div class="history-name">康师傅红烧牛肉面</div>
          <div class="history-time">今天 14:30</div>
        </div>
        <div class="history-card">
          <div class="history-dot green"></div>
          <div class="history-name">三元纯牛奶</div>
          <div class="history-time">昨天 10:15</div>
        </div>
        <div class="history-card">
          <div class="history-dot yellow"></div>
          <div class="history-name">乐事薯片</div>
          <div class="history-time">昨天 09:20</div>
        </div>
      </div>
      <div class="section-title"><span>常用功能</span></div>
      <div class="quick-entry">
        <div class="entry-card">
          <div class="entry-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
          </div>
          <div class="entry-name">成分百科</div>
        </div>
        <div class="entry-card">
          <div class="entry-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </div>
          <div class="entry-name">饮食日记</div>
        </div>
        <div class="entry-card">
          <div class="entry-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
          </div>
          <div class="entry-name">健康周报</div>
        </div>
      </div>
      <div class="section-title"><span>健康提示</span></div>
      <div class="tip-card">
        <div class="tip-header">
          <span class="tip-icon">💡</span>
          <span class="tip-title">钠摄入偏高</span>
        </div>
        <div class="tip-desc">本周扫描的3款食品钠含量较高,建议选择低钠替代品</div>
      </div>
      <div class="tip-card">
        <div class="tip-header">
          <span class="tip-icon">📊</span>
          <span class="tip-title">查看本周健康报告</span>
        </div>
        <div class="tip-desc">了解您的饮食习惯和营养摄入情况</div>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab-item active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>首页</span>
      </div>
      <div class="tab-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span>扫码</span>
      </div>
      <div class="tab-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <span>日记</span>
      </div>
      <div class="tab-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>我的</span>
      </div>
    </div>
  </div>
</body>
</html>
