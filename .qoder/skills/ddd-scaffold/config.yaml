# DDD Scaffold 配置文件
# 此文件定义项目生成的默认行为和模板

## 基础配置
version: "1.0.0"
name: "DDD Clean Architecture Scaffold"
description: "快速生成标准化的 DDD 项目结构"
```yaml
scaffold:
  version: "1.0.0"
  name: "DDD Clean Architecture Scaffold"
  description: "快速生成标准化的 DDD 项目结构"
  
  # 默认配置
  defaults:
    output_dir: "./generated"
    style: "standard"  # minimal | standard | full
    go_version: "1.21"
    
  # 架构风格配置
  styles:
    minimal:
      layers: ["domain", "application"]
      features: []
      description: "最小化架构，仅包含核心领域层和应用层"
      
    standard:
      layers: ["domain", "application", "infrastructure", "interfaces"]
      features: ["wire", "gorm", "nats"]
      description: "标准 DDD 架构，包含完整四层和常用集成"
      
    full:
      layers: ["domain", "application", "infrastructure", "interfaces"]
      features: ["wire", "gorm", "nats", "asynq", "redis", "docker", "monitoring"]
      description: "完整架构，包含所有最佳实践和工具集成"
```

## 领域模板配置
```yaml
domain_templates:
  # 实体模板
  entity:
    template_file: "templates/entity.go.tmpl"
    fields:
      - name: "ID"
        type: "string"
        tags: 'json:"id" gorm:"primaryKey"'
      - name: "CreatedAt"
        type: "time.Time"
        tags: 'json:"created_at" gorm:"autoCreateTime"'
      - name: "UpdatedAt"
        type: "time.Time"
        tags: 'json:"updated_at" gorm:"autoUpdateTime"'
        
  # 值对象模板
  value_object:
    template_file: "templates/value_object.go.tmpl"
    characteristics:
      - immutable
      - no_methods_except_constructors
      - value_based_equality
      
  # 聚合根模板
  aggregate:
    template_file: "templates/aggregate.go.tmpl"
    required_components:
      - root_entity
      - internal_entities
      - business_methods
      - domain_events
      
  # Repository 接口模板
  repository_interface:
    template_file: "templates/repository_interface.go.tmpl"
    standard_methods:
      - Save
      - FindByID
      - FindAll
      - Update
      - Delete
      
  # 领域服务模板
  domain_service:
    template_file: "templates/domain_service.go.tmpl"
    usage_scenarios:
      - cross_entity_logic
      - external_integration
      - complex_business_rules
```

## 应用层模板配置
```yaml
application_templates:
  # 应用服务模板
  service:
    template_file: "templates/application_service.go.tmpl"
    responsibilities:
      - coordinate_domain_objects
      - handle_transactions
      - publish_domain_events
      
  # DTO 模板
  dto:
    template_file: "templates/dto.go.tmpl"
    types:
      - CreateRequest
      - UpdateRequest
      - Response
      - ListResponse
      
  # 事件处理器模板
  event_handler:
    template_file: "templates/event_handler.go.tmpl"
    integration_points:
      - notification
      - data_sync
      - audit_logging
```

## 基础设施层配置
```yaml
infrastructure_templates:
  # GORM Repository 实现
  gorm_repository:
    template_file: "templates/gorm_repository.go.tmpl"
    database_type: "postgresql"
    features:
      - auto_migration
      - connection_pool
      - query_builder
      
  # Wire 依赖注入
  wire_di:
    template_file: "templates/wire.go.tmpl"
    providers:
      - repository_providers
      - service_providers
      - handler_providers
      
  # NATS 事件发布
  nats_publisher:
    template_file: "templates/nats_publisher.go.tmpl"
    features:
      - async_publish
      - retry_mechanism
      - error_handling
```

## 示例领域配置（用户领域）
```yaml
example_domain:
  name: "user"
  enabled: true
  
  entities:
    - name: "User"
      fields:
        - name: "ID"
          type: "string"
          validation: "required,uuid"
        - name: "Name"
          type: "string"
          validation: "required,min=2,max=50"
        - name: "Email"
          type: "string"
          validation: "required,email"
        - name: "PasswordHash"
          type: "string"
          validation: "required,min=60"
        - name: "Role"
          type: "UserRole"
          validation: "required"
          
  value_objects:
    - name: "UserRole"
      type: "string"
      constants:
        - ADMIN
        - MEMBER
        - GUEST
        
  aggregates:
    - name: "UserAggregate"
      root_entity: "User"
      internal_entities: []
      business_methods:
        - HashPassword
        - VerifyPassword
        - UpdateProfile
        - Activate
        - Deactivate
        
  repository_methods:
    - FindByEmail
    - FindByRole
    - ExistsByEmail
    
  application_services:
    - name: "UserService"
      methods:
        - CreateUser
        - GetUserByID
        - UpdateUser
        - DeleteUser
        - ListUsers
```

## 集成配置
```yaml
integrations:
  # 数据库集成
  database:
    postgresql:
      driver: "github.com/lib/pq"
      dsn_format: "host=%s user=%s password=%s dbname=%s port=%s sslmode=disable"
      default_port: 5432
      
    mysql:
      driver: "github.com/go-sql-driver/mysql"
      dsn_format: "%s:%s@tcp(%s:%s)/%s?charset=utf8mb4&parseTime=True&loc=Local"
      default_port: 3306
      
  # ORM 配置
  orm:
    gorm:
      version: "v1.25"
      features:
        - auto_migrate
        - hooks
        - associations
        - transactions
        
  # 消息队列集成
  messaging:
    nats:
      version: "v2.9"
      default_subject_prefix: "app.events"
      features:
        - publish_subscribe
        - queue_groups
        - persistent_messages
        
  # 任务调度集成
  task_queue:
    asynq:
      version: "v0.18"
      redis_config:
        address: "localhost:6379"
        db: 0
      features:
        - delayed_tasks
        - periodic_tasks
        - retry_mechanism
        
  # 缓存集成
  cache:
    redis:
      version: "github.com/redis/go-redis/v9"
      features:
        - key_value_storage
        - expiration
        - pub_sub
```

## 生成选项配置
```yaml
generation_options:
  # 代码生成选项
  code_generation:
    format_style: "goimports"
    line_length: 120
    generate_comments: true
    generate_tests: false
    generate_examples: false
    
  # 文件生成选项
  file_generation:
    create_directories: true
    overwrite_existing: false
    backup_on_overwrite: true
    skip_unchanged: true
    
  # 文档生成选项
  documentation:
    create_readme: true
    create_api_docs: false
    include_swagger_annotations: true
```

## Docker 配置
```yaml
docker:
  compose_version: "3.8"
  
  services:
    app:
      build_context: "."
      dockerfile: "Dockerfile"
      ports:
        - "8080:8080"
      depends_on:
        - postgres
        - redis
        - nats
        
    postgres:
      image: "postgres:14-alpine"
      environment:
        POSTGRES_USER: "myapp"
        POSTGRES_PASSWORD: "secret"
        POSTGRES_DB: "myapp"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      ports:
        - "5432:5432"
        
    redis:
      image: "redis:7-alpine"
      ports:
        - "6379:6379"
        
    nats:
      image: "nats:2.9-alpine"
      ports:
        - "4222:4222"
        - "8222:8222"
        
  volumes:
    - postgres_data
```

## Makefile 模板
```yaml
makefile:
  targets:
    - name: "build"
      command: "go build -o bin/server ./cmd/server"
      
    - name: "run"
      command: "go run ./cmd/server/main.go"
      
    - name: "test"
      command: "go test -v ./..."
      
    - name: "lint"
      command: "golangci-lint run"
      
    - name: "generate"
      command: "wire gen ./..."
      
    - name: "migrate-up"
      command: "migrate -path migrations/sql -database postgres://... up"
      
    - name: "docker-up"
      command: "docker-compose up -d"
      
    - name: "docker-down"
      command: "docker-compose down"
```

## 质量门禁配置
```yaml
quality_gates:
  # 代码覆盖率要求
  coverage:
    minimum: 80
    target: 90
    
  # 代码复杂度要求
  complexity:
    maximum_function_length: 50
    maximum_cyclomatic_complexity: 10
    
  # 代码审查要求
  review:
    required_reviews: 1
    require_test_coverage: true
    require_documentation: true
    
  # 验证规则
  validation_rules:
    - name: "domain_purity"
      description: "领域层不应依赖基础设施层"
      severity: "error"
      
    - name: "aggregate_consistency"
      description: "聚合根应维护内部一致性"
      severity: "warning"
      
    - name: "repository_abstraction"
      description: "Repository 应返回领域对象而非 ORM 对象"
      severity: "error"
```
