name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true
        cache-dependency-path: backend/go.sum
    
    - name: Install dependencies
      working-directory: ./backend
      run: make install deps
    
    - name: Run linter
      working-directory: ./backend
      run: make lint
    
    - name: Run go vet
      working-directory: ./backend
      run: make vet
    
    - name: Check formatting
      working-directory: ./backend
      run: |
        make fmt
        if [ -n "$(git diff)" ]; then
          echo "Code is not formatted. Run 'make fmt' locally and commit."
          exit 1
        fi

  test:
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: go_ddd_scaffold_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true
        cache-dependency-path: backend/go.sum
    
    - name: Install dependencies
      working-directory: ./backend
      run: make install deps
    
    - name: Run unit tests
      working-directory: ./backend
      run: make test unit
    
    - name: Run integration tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/go_ddd_scaffold_test?sslmode=disable
        REDIS_URL: redis://localhost:6379
      run: make test integration
    
    - name: Generate coverage report
      working-directory: ./backend
      run: |
        go test -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out | grep "total:" | awk '{print $3}' | sed 's/%//' > coverage-percent.txt
        COVERAGE=$(cat coverage-percent.txt)
        echo "Test coverage: ${COVERAGE}%"
        if (( $(echo "$COVERAGE < 60" | bc -l) )); then
          echo "Coverage ${COVERAGE}% is below threshold 60%"
          exit 1
        fi
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./backend/coverage.out
        flags: unittests
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Build API
      working-directory: ./backend
      run: make build
    
    - name: Build Worker
      working-directory: ./backend
      run: make build worker
    
    - name: Build CLI
      working-directory: ./backend
      run: make cli
