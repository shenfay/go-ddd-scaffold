# ============================================
# Casbin RBAC + 多租户权限模型
# 适用于 MathFun 儿童数学教育平台
# ============================================

# 请求定义
# sub: 用户标识 (user_id)
# dom: 租户/域 (tenant_id)
# obj: 资源 (resource)
# act: 操作 (action)
[request_definition]
r = sub, dom, obj, act

# 策略定义
# p: 角色, 租户, 资源, 操作
[policy_definition]
p = sub, dom, obj, act

# 角色定义
# g: 用户, 角色, 租户
# 支持继承关系
[role_definition]
g = _, _, _

# 策略效果
# 如果有任意一条策略匹配且为 allow，则允许
[policy_effect]
e = some(where (p.eft == allow))

# 匹配器
# 1. 检查用户是否有对应角色 g(r.sub, p.sub, r.dom)
# 2. 检查租户是否匹配 r.dom == p.dom
# 3. 检查资源是否匹配 r.obj == p.obj
# 4. 检查操作是否匹配 r.act == p.act
# 5. 对于超级管理员，绕过检查
[matchers]
m = g(r.sub, p.sub, r.dom) && r.dom == p.dom && (p.obj == "all" || r.obj == p.obj) && (p.act == "all" || r.act == p.act) || r.sub == "super_admin"

# ============================================
# 优先级定义（可选）
# 当有多个策略匹配时，按优先级决定
# [policy_priority]
# p.sub > p.sub
# ============================================
