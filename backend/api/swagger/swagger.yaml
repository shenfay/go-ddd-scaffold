basePath: /api/v1
definitions:
  internal_activitylog.ActivityLog:
    properties:
      action:
        $ref: '#/definitions/internal_activitylog.ActivityType'
      browser:
        description: 浏览器名称
        type: string
      created_at:
        type: string
      description:
        description: 活动描述
        type: string
      device:
        description: 设备类型（mobile/desktop）
        type: string
      email:
        type: string
      id:
        type: string
      ip:
        description: IPv6 最大长度
        type: string
      metadata:
        description: 额外元数据（JSON 格式）
        type: string
      os:
        description: 操作系统
        type: string
      status:
        $ref: '#/definitions/internal_activitylog.ActivityStatus'
      user_agent:
        description: 浏览器/设备信息
        type: string
      user_id:
        type: string
    type: object
  internal_activitylog.ActivityStatus:
    enum:
    - SUCCESS
    - FAILED
    type: string
    x-enum-varnames:
    - ActivitySuccess
    - ActivityFailed
  internal_activitylog.ActivityType:
    enum:
    - LOGIN
    - LOGOUT
    - REGISTER
    - REFRESH_TOKEN
    - PASSWORD_CHANGE
    - PROFILE_UPDATE
    - EMAIL_VERIFY
    - REVOKE_DEVICE
    - LOGOUT_ALL
    - RESEND_VERIFY_EMAIL
    - FORGOT_PASSWORD
    - RESET_PASSWORD
    - ACCOUNT_LOCK
    - ACCOUNT_UNLOCK
    type: string
    x-enum-comments:
      ActivityAccountLock: 账户锁定
      ActivityAccountUnlock: 账户解锁
      ActivityEmailVerify: 验证邮箱
      ActivityForgotPassword: 申请密码重置
      ActivityLogin: 用户登录
      ActivityLogout: 用户登出
      ActivityLogoutAll: 退出所有设备
      ActivityPasswordChange: 修改密码
      ActivityProfileUpdate: 更新资料
      ActivityRefreshToken: 刷新 Token
      ActivityRegister: 用户注册
      ActivityResendVerifyEmail: 重发验证邮件
      ActivityResetPassword: 重置密码
      ActivityRevokeDevice: 踢出设备
    x-enum-descriptions:
    - 用户登录
    - 用户登出
    - 用户注册
    - 刷新 Token
    - 修改密码
    - 更新资料
    - 验证邮箱
    - 踢出设备
    - 退出所有设备
    - 重发验证邮件
    - 申请密码重置
    - 重置密码
    - 账户锁定
    - 账户解锁
    x-enum-varnames:
    - ActivityLogin
    - ActivityLogout
    - ActivityRegister
    - ActivityRefreshToken
    - ActivityPasswordChange
    - ActivityProfileUpdate
    - ActivityEmailVerify
    - ActivityRevokeDevice
    - ActivityLogoutAll
    - ActivityResendVerifyEmail
    - ActivityForgotPassword
    - ActivityResetPassword
    - ActivityAccountLock
    - ActivityAccountUnlock
  internal_auth.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/internal_auth.UserResponse'
    type: object
  internal_auth.DeviceResponse:
    properties:
      created_at:
        type: string
      device_type:
        type: string
      ip:
        type: string
      is_current:
        type: boolean
      token_id:
        type: string
      user_agent:
        type: string
    type: object
  internal_auth.DevicesResponse:
    properties:
      devices:
        items:
          $ref: '#/definitions/internal_auth.DeviceResponse'
        type: array
    type: object
  internal_auth.ErrorResponse:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  internal_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_auth.LogoutRequest:
    properties:
      user_id:
        type: string
    type: object
  internal_auth.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_auth.RegisterRequest:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  internal_auth.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      id:
        type: string
      last_login_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.github.com/shenfay/go-ddd-scaffold
  description: 生产级 DDD 脚手架项目的 API 文档，包含用户认证、事件驱动等核心功能。
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Go DDD Scaffold API
  version: "1.0"
paths:
  /auth/devices:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.DevicesResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user's logged-in devices
      tags:
      - Authentication
  /auth/devices/{token}:
    delete:
      parameters:
      - description: Device token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke a specific device
      tags:
      - Authentication
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
        "423":
          description: Account locked
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      summary: User login
      tags:
      - Authentication
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Logout data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - Authentication
  /auth/logout-all:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout from all devices
      tags:
      - Authentication
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user information
      tags:
      - Authentication
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
        "401":
          description: Invalid or expired token
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      summary: Refresh access token
      tags:
      - Authentication
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
        "409":
          description: Email already exists
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      summary: Register a new user
      tags:
      - Authentication
  /users/{id}:
    get:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user information by ID
      tags:
      - Users
  /users/{id}/activity-logs:
    get:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_activitylog.ActivityLog'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get user activity logs
      tags:
      - Activity
  /users/me/activity-logs:
    get:
      parameters:
      - default: 10
        description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_activitylog.ActivityLog'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get current user activity logs
      tags:
      - Activity
securityDefinitions:
  BearerAuth:
    description: 使用 JWT Token，格式：Bearer {token}
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
