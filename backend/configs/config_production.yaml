server:
  port: "80"
  mode: "release"
  read_timeout: "60s"
  write_timeout: "60s"

database:
  host: "${DB_HOST}"
  port: "${DB_PORT}"
  name: "${DB_NAME}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  max_idle_conns: 20
  max_open_conns: 100
  conn_max_lifetime: "1h"

redis:
  addr: "${REDIS_ADDR}"
  password: "${REDIS_PASSWORD}"

jwt:
  secret: "${JWT_SECRET}"
  access_expire: 30m
  refresh_expire: 168h

logging:
  level: "info"
  format: "json"
  file: "/var/log/scaffold/app.log"